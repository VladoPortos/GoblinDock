name: Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "32 4 * * 1"

permissions:
  contents: read

jobs:
  scan:
    name: Filesystem scan (vuln · secret · misconfig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      # Report-only: exit-code defaults to 0, so findings flow to the Security tab via
      # SARIF but never fail the build. Set exit-code: 1 to gate merges on findings.
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Without this the SARIF emits ALL severities regardless of the filter above.
          limit-severities-for-sarif: true
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
